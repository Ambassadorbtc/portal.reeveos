name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            # Backend deps
            cd /opt/rezvo-app/backend
            pip3 install -r requirements.txt --break-system-packages -q 2>/dev/null || pip3 install -r requirements.txt -q

            # Frontend build
            cd /opt/rezvo-app/frontend
            npm install --silent
            npm run build

            # Systemd
            printf '[Unit]\nDescription=Rezvo Backend API\nAfter=network.target mongod.service\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/rezvo-app/backend\nExecStart=/usr/local/bin/uvicorn server:app --host 0.0.0.0 --port 8000\nRestart=always\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/rezvo-backend.service
            systemctl daemon-reload
            systemctl restart rezvo-backend

            # Nginx
            cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            sleep 3

            # ONE-TIME: Setup Coffee Haven enterprise
            cd /opt/rezvo-app/backend
            python3 -c "
import asyncio
from motor.motor_asyncio import AsyncIOMotorClient
from datetime import datetime
from config import settings

async def main():
    client = AsyncIOMotorClient(settings.mongodb_url)
    db = client[settings.database_name]
    user = await db.users.find_one({'email': 'adda@coffeehaven.com'})
    if not user:
        print('USER NOT FOUND'); return
    print(f'Found: {user[\"name\"]}')
    if user.get('business_ids') and len(user['business_ids']) > 0:
        bid = user['business_ids'][0]
        from bson import ObjectId
        try: await db.businesses.update_one({'_id': ObjectId(bid)}, {'\$set': {'tier': 'enterprise', 'rezvo_tier': 'enterprise'}})
        except: await db.businesses.update_one({'_id': bid}, {'\$set': {'tier': 'enterprise', 'rezvo_tier': 'enterprise'}})
        print(f'Updated existing business {bid} to enterprise')
        return
    biz = {'name': 'Coffee Haven', 'type': 'restaurant', 'category': 'cafe', 'tier': 'enterprise', 'rezvo_tier': 'enterprise', 'owner_id': str(user['_id']), 'slug': 'coffee-haven', 'email': 'adda@coffeehaven.com', 'address': {'city': 'Nottingham', 'country': 'UK'}, 'staff': [{'id': 'staff-1', 'name': 'Manager', 'role': 'manager', 'active': True}, {'id': 'staff-2', 'name': 'Barista 1', 'role': 'staff', 'active': True}], 'booking_settings': {'slot_duration': 30, 'opening_hours': {'open': '07:00', 'close': '22:00'}}, 'features_enabled': ['calendar','bookings','staff','services','floor_plan','tables','analytics','reviews','crm','marketing','orders','payments','online_booking','booking_link'], 'created_at': datetime.utcnow(), 'updated_at': datetime.utcnow()}
    r = await db.businesses.insert_one(biz)
    bid = str(r.inserted_id)
    await db.users.update_one({'_id': user['_id']}, {'\$set': {'business_ids': [bid], 'role': 'owner'}})
    print(f'Created Coffee Haven ({bid}) - Enterprise')

asyncio.run(main())
"
            echo "✅ DEPLOY + SETUP COMPLETE"
