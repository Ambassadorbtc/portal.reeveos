name: Deploy Rezvo.app to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # ── Pull latest code ──
            if [ ! -d "/opt/rezvo-app/.git" ]; then
              git clone https://github.com/Ambassadorbtc/Rezvo.app.git /opt/rezvo-app
            fi

            cd /opt/rezvo-app
            git fetch origin main
            git reset --hard origin/main

            # ── Backend deps ──
            cd /opt/rezvo-app/backend
            pip3 install -r requirements.txt --break-system-packages -q 2>/dev/null || pip3 install -r requirements.txt -q

            # ── Frontend build ──
            cd /opt/rezvo-app/frontend
            npm install --silent
            VITE_API_URL=/api npm run build

            # ── Backend service ──
            # Ensure backend .env has required keys
            touch /opt/rezvo-app/backend/.env
            grep -q 'ANTHROPIC_API_KEY' /opt/rezvo-app/backend/.env || echo 'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}' >> /opt/rezvo-app/backend/.env
            # Update if already exists
            sed -i "s|^ANTHROPIC_API_KEY=.*|ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}|" /opt/rezvo-app/backend/.env

            # Resend (email)
            if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
              grep -q 'RESEND_API_KEY' /opt/rezvo-app/backend/.env && sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}|" /opt/rezvo-app/backend/.env || echo 'RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}' >> /opt/rezvo-app/backend/.env
            fi

            # Twilio (SMS)
            if [ -n "${{ secrets.TWILIO_ACCOUNT_SID }}" ]; then
              grep -q 'TWILIO_ACCOUNT_SID' /opt/rezvo-app/backend/.env && sed -i "s|^TWILIO_ACCOUNT_SID=.*|TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}|" /opt/rezvo-app/backend/.env || echo 'TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}' >> /opt/rezvo-app/backend/.env
              grep -q 'TWILIO_AUTH_TOKEN' /opt/rezvo-app/backend/.env && sed -i "s|^TWILIO_AUTH_TOKEN=.*|TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}|" /opt/rezvo-app/backend/.env || echo 'TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}' >> /opt/rezvo-app/backend/.env
              grep -q 'TWILIO_PHONE_NUMBER' /opt/rezvo-app/backend/.env && sed -i "s|^TWILIO_PHONE_NUMBER=.*|TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}|" /opt/rezvo-app/backend/.env || echo 'TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}' >> /opt/rezvo-app/backend/.env
            fi

            cat > /etc/systemd/system/rezvo-backend.service << 'EOF'
            [Unit]
            Description=Rezvo Backend API
            After=network.target mongod.service

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/rezvo-app/backend
            EnvironmentFile=-/opt/rezvo-app/backend/.env
            ExecStart=/usr/local/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl restart rezvo-backend

            # ── Nginx — all paths serve from /opt/rezvo-app directly ──
            cp /opt/rezvo-app/nginx.conf /etc/nginx/sites-available/rezvo-app
            ln -sf /etc/nginx/sites-available/rezvo-app /etc/nginx/sites-enabled/rezvo-app
            nginx -t && systemctl reload nginx

            sleep 3

            # ── Ensure admin account ──
            if [ -f /opt/rezvo-app/backend/setup_admin.py ]; then
              cd /opt/rezvo-app/backend
              python3 setup_admin.py || echo "Admin setup note: check logs"
            fi

            # ── Run data migrations ──
            if [ -f /opt/rezvo-app/backend/fix_micho_hours.py ]; then
              cd /opt/rezvo-app/backend
              python3 fix_micho_hours.py || echo "Migration note: check logs"
            fi

            echo "✅ DEPLOY COMPLETE"
