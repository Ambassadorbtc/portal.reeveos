name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check server state
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== WHERE IS UVICORN ==="
            which uvicorn 2>/dev/null || echo "not in PATH"
            find / -name "uvicorn" -type f 2>/dev/null | head -5
            pip3 show uvicorn 2>/dev/null | head -5

            echo "=== BACKEND SERVICE STATUS ==="
            systemctl status rezvo-backend 2>&1 | head -15

            echo "=== PYTHON VERSION ==="
            python3 --version
            which python3

            echo "=== TRY RUNNING MANUALLY ==="
            cd /opt/rezvo-app/backend && python3 -c "import server; print('server imports OK')" 2>&1
            cd /opt/rezvo-app/backend && python3 -c "import uvicorn; print('uvicorn OK')" 2>&1
