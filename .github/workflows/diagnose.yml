name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check server state
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== VITE_API_URL in built JS ==="
            grep -o 'VITE_API_URL[^"]*"[^"]*"' /opt/rezvo-app/frontend/dist/assets/*.js 2>/dev/null || echo "not found as named"
            grep -o 'http://localhost:8000' /opt/rezvo-app/frontend/dist/assets/*.js 2>/dev/null && echo "STILL USING LOCALHOST" || echo "no localhost refs"
            grep -o '/api' /opt/rezvo-app/frontend/dist/assets/*.js 2>/dev/null | head -5

            echo "=== TEST API DIRECTLY ==="
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/auth/register 2>&1 || echo "cant reach"
            curl -s http://127.0.0.1:8000/ 2>&1 | head -5

            echo "=== TEST NGINX PROXY ==="
            curl -sk -o /dev/null -w "%{http_code}" https://rezvo.app/api/auth/register 2>&1

            echo "=== BACKEND LOG ==="
            journalctl -u rezvo-backend --no-pager -n 15

            echo "=== CHECK .env.production ==="
            cat /opt/rezvo-app/frontend/.env.production 2>/dev/null || echo "NO .env.production"
