name: Diagnose Backend
on: workflow_dispatch
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            echo "=== Service Status ==="
            systemctl status rezvo-backend --no-pager -l 2>&1 | tail -30
            echo ""
            echo "=== Journal Logs ==="
            journalctl -u rezvo-backend --no-pager -n 50 2>&1
            echo ""
            echo "=== Backend .env (keys masked) ==="
            cat /opt/rezvo-app/backend/.env | sed 's/=.*/=***/'
            echo ""
            echo "=== Python import test ==="
            cd /opt/rezvo-app/backend && python3 -c "from server import app; print('OK')" 2>&1
            echo ""
            echo "=== Port 8000 ==="
            ss -tlnp | grep 8000 || echo "Nothing on 8000"
