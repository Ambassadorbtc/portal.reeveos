name: Get MongoDB URI

on:
  workflow_dispatch:

jobs:
  get-env:
    runs-on: ubuntu-latest
    steps:
      - name: Get env vars
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.33.73
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== MONGODB ==="
            grep MONGODB /opt/rezvo-app/backend/.env 2>/dev/null || echo "No .env found at /opt/rezvo-app"
            grep MONGODB /opt/rezvo/backend/.env 2>/dev/null || echo "No .env found at /opt/rezvo"
            echo "=== ALL ENV KEYS ==="
            cat /opt/rezvo-app/backend/.env 2>/dev/null | sed 's/=.*/=***/' || echo "No .env"
